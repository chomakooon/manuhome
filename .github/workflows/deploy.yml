name: Deploy to Xserver

# main への push で自動ビルド & Xserver へ FTPS 転送
on:
  push:
    branches: [main]
  workflow_dispatch: # 手動実行も可能

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (.env.production を使用)
        run: npm run build

      # dist/ を Xserver のサブドメイン用ドキュメントルートへ FTPS 転送
      # 必要な Secrets: FTP_SERVER / FTP_USERNAME / FTP_PASSWORD / FTP_TARGET_DIR
      - name: Deploy to Xserver via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          # 既存ファイルは差分同期（全削除はしない）
          dangerous-clean-slate: false
