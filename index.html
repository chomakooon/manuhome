<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Phase 18: Google Fonts を <link> + preconnect で並列ロード（CSS @import から移管）。
         display=swap で FOUT を許容しテキスト即時表示を優先する。 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700;800;900&family=Noto+Serif+JP:wght@400;500;600;700;900&family=Dela+Gothic+One&family=M+PLUS+Rounded+1c:wght@400;700;800;900&family=Yomogi&display=swap"
    />

    <!-- Phase 15: SEO / OGP / Favicon の既定値。
         各ページの <title> / <meta> / <link rel="canonical"> 等は
         React 19 ネイティブの Document Metadata 機能で動的に上書きされる。 -->
    <title>カタチらぼ | 伝えたいを、イラストで一瞬に。</title>
    <meta name="description" content="岡崎真奈が運営する個人クリエイティブスタジオ「カタチらぼ」。漫画・キャラクター・ペットイラスト・名刺・ロゴ・グッズ制作まで、伝えたい想いを一枚の絵に。お見積もり無料。" />
    <meta name="keywords" content="イラスト,漫画,キャラクターデザイン,ペットイラスト,名刺デザイン,ロゴデザイン,4コマ漫画,PR漫画,岡崎真奈,カタチらぼ" />
    <meta name="author" content="岡崎真奈" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#00CFFF" />

    <!-- Favicon (Phase 15)
         - favicon.svg をプライマリに使用（ベクター: タブで鮮明）
         - PNG / ICO / Apple Touch Icon は岡崎さんが後日差し替え予定
         - 未配置時はブラウザがデフォルトを表示する（404 でも致命的ではない） -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="alternate icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- 既定 OGP（各ページで上書き） -->
    <meta property="og:site_name" content="カタチらぼ" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="カタチらぼ | 伝えたいを、イラストで一瞬に。" />
    <meta property="og:description" content="岡崎真奈が運営する個人クリエイティブスタジオ「カタチらぼ」。漫画・キャラクター・ペットイラスト・名刺・ロゴ・グッズ制作まで、伝えたい想いを一枚の絵に。お見積もり無料。" />
    <meta property="og:url" content="https://katachi-lab.creative-own.com/" />
    <meta property="og:image" content="https://katachi-lab.creative-own.com/og-images/og-home.jpg" />

    <!-- Twitter Card (各ページで上書き) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="カタチらぼ | 伝えたいを、イラストで一瞬に。" />
    <meta name="twitter:description" content="岡崎真奈が運営する個人クリエイティブスタジオ「カタチらぼ」。漫画・キャラクター・ペットイラスト・名刺・ロゴ・グッズ制作まで、伝えたい想いを一枚の絵に。お見積もり無料。" />
    <meta name="twitter:image" content="https://katachi-lab.creative-own.com/og-images/og-home.jpg" />

    <!-- 既定 canonical（SPA のため、各ページで動的に上書き） -->
    <link rel="canonical" href="https://katachi-lab.creative-own.com/" />

    <!-- Organization 構造化データ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "カタチらぼ",
        "url": "https://katachi-lab.creative-own.com",
        "logo": "https://katachi-lab.creative-own.com/favicon.svg",
        "description": "岡崎真奈が運営する個人クリエイティブスタジオ「カタチらぼ」。漫画・キャラクター・ペットイラスト・名刺・ロゴ・グッズ制作まで、伝えたい想いを一枚の絵に。",
        "founder": {
          "@type": "Person",
          "name": "岡崎真奈"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
